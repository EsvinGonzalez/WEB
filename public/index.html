<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mi Nombre</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #4f46e5 0%, #ec4899 100%);
      color: #ffffff;
    }
    .card {
      width: min(520px, 90%);
      background: rgba(255, 255, 255, 0.12);
      border: 1px solid rgba(255, 255, 255, 0.22);
      backdrop-filter: blur(18px);
      box-shadow: 0 20px 40px rgba(15, 23, 42, 0.25);
      border-radius: 24px;
      padding: 36px 32px;
      text-align: center;
    }
    .avatar {
      width: 96px;
      height: 96px;
      margin: 0 auto 20px;
      border-radius: 50%;
      background: linear-gradient(135deg, rgba(255,255,255,0.6), rgba(255,255,255,0.2));
      display: grid;
      place-items: center;
      font-size: 2rem;
      color: #1f2937;
      box-shadow: inset 0 0 0 1px rgba(255,255,255,0.35);
    }
    h1 {
      margin: 0;
      font-size: clamp(2rem, 4vw, 3rem);
      letter-spacing: -0.03em;
      text-shadow: 0 8px 30px rgba(15, 23, 42, 0.25);
    }
    p {
      margin: 18px auto 0;
      max-width: 420px;
      color: rgba(255, 255, 255, 0.92);
      line-height: 1.7;
      font-size: 1rem;
    }
    .button-row {
      margin-top: 28px;
      display: flex;
      justify-content: center;
      gap: 16px;
      flex-wrap: wrap;
    }
    .btn {
      border: none;
      border-radius: 999px;
      padding: 14px 24px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.2s ease, box-shadow 0.2s ease, background 0.2s ease;
    }
    .btn-primary {
      background: #ffffff;
      color: #4f46e5;
      box-shadow: 0 12px 24px rgba(15, 23, 42, 0.18);
    }
    .btn-secondary {
      background: rgba(255, 255, 255, 0.18);
      color: #ffffff;
      border: 1px solid rgba(255, 255, 255, 0.35);
    }
    .btn:hover {
      transform: translateY(-2px);
    }
    .btn-primary:hover {
      box-shadow: 0 16px 28px rgba(15, 23, 42, 0.24);
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="avatar">EG</div>
    <h1>Esvin Giovanni Gonzalez de la Cruz</h1>
    <p>Bienvenido a mi app web sencilla Primer despliegue</p>
    <div class="button-row">
      <button class="btn btn-primary" onclick="showMessage()">Ver saludo</button>
      <button class="btn btn-secondary" onclick="copyName()">Copiar nombre</button>
    </div>
  </div>

  <script>
    function showMessage() {
      alert('Hola, soy Esvin Giovanni Gonzalez de la Cruz. ¡Bienvenido!');
    }
    function copyName() {
      navigator.clipboard.writeText('Esvin Giovanni Gonzalez de la Cruz');
      alert('Nombre copiado al portapapeles');
    }
  </script>
</body>
</html>
